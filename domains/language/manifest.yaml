manifest_schema: manifest_schema_v1
domain: language
version: "1.1"
status: stub

purpose: >
  Decompose linguistic communication into structural invariants across lexical,
  syntactic, and semantic layers. Identify structural identity that survives
  translation or register shift.

docs:
  readme: domains/language/README.md
  spec: domains/language/SPEC.md

domain_local_metrics:
  class: LanguageStructuralSignals
  path: domains/language/feature_extraction/  # target; not verified as implemented
  layers:
    lexical:
      - morpheme_density
      - lexical_diversity
      - phonetic_entropy
    syntactic:
      - phrasal_depth
      - dependency_length
      - inflectional_constraint
      - phrasal_repetition_rate
    semantic:
      - topic_cohesion
      - argument_structure_complexity
      - topic_transition_smoothness

shared_embedding:
  adapter: not_implemented
  projection_schema: language_v1  # target only; not implemented
  output_format: HelixEmbedding
  axes:
    - complexity
    - structure
    - repetition
    - density
    - expression
    - variation
  confidence_floor: 0.30
  confidence_calibration_status: not_applicable  # no runtime to calibrate yet

entry_point:
  target: "HSL: INGEST_TRACK language.<id>, ANALYZE_TRACK language.<id>"
  current: "domains/language/pipeline.py (stub — raises NotImplementedError)"
  hsl_implemented: false

runtime:
  pipeline: domains/language/pipeline.py
  pipeline_status: stub
  stages:
    - { stage: 1, name: ingestion,        path: domains/language/ingestion/,         status: unknown }
    - { stage: 2, name: tokenization,     path: domains/language/feature_extraction/, status: unknown }
    - { stage: 3, name: syntax_parse,     path: domains/language/structural_analysis/, status: unknown }
    - { stage: 4, name: semantic_tagging, path: domains/language/pattern_detection/, status: unknown }
    - { stage: 5, name: feature_fusion,   path: not_implemented,                     status: not_implemented }
    - { stage: 6, name: atlas_compilation,path: not_implemented,                     status: not_implemented }

fixtures: []  # none defined

validation:
  domain_harness: domains/language/validation/  # does not exist
  domain_harness_status: not_implemented
  governance_boundary: core/governance/validation/boundary_validator.py

atlas_persistence:
  status: not_implemented
  gate: core/compiler/atlas_compiler.py

dependencies:
  core:
    - core/governance/validation/
    - core/compiler/atlas_compiler.py
  external:
    - spacy  # target; not verified as installed
    - nltk   # target; not verified as installed

known_gaps:
  - pipeline.py is a stub; no implemented runtime path
  - Subdirectory contents (ingestion/, feature_extraction/, etc.) not verified as functional
  - No embedding generation
  - No formal validation harness
  - No HSL entry point
  - No null-model guard
  - No Atlas persistence path
