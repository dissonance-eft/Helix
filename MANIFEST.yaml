    index: docs/profiles/
    dissonance: docs/profiles/DISSONANCE.md
  core:
    enforcement: core/enforcement/ENFORCEMENT.md

# Canonical architecture layers — in pipeline order
layers:
  - name: hsl
    path: core/hsl/
    role: entry_point
    description: Sole legal entry point for all system execution

  - name: normalization
    path: core/normalization/
    role: preprocessing
    description: ID format and schema unification

  - name: semantics
    path: core/semantics/
    role: preprocessing
    description: Entity type and property resolution

  - name: operators
    path: core/operators/
    role: orchestration
    description: Nine core operators; orchestrate but do not execute domain work

  - name: adapters
    path: core/adapters/
    role: translation
    description: Domain-to-canonical translation layer

  - name: compiler
    path: core/compiler/
    role: persistence_gate
    description: Sole Atlas write authority; atlas_compiler.py is the enforcement point

  - name: enforcement
    path: core/enforcement/
    role: runtime_guard
    description: Persistence gate, shadow audit, failure states

  - name: governance
    path: core/governance/
    role: validation
    description: Atlas promotion criteria, audit, boundary enforcement

  - name: kernel
    path: core/kernel/
    role: runtime
    description: Dispatcher, substrate guards, ring import validation

  - name: integrity
    path: core/integrity/
    role: structural_enforcement
    description: Root structure enforcement, architecture watchdog

# Canonical data stores
stores:
  library:
    path: codex/library/
    description: Reference storage — read-only input side of Atlas
  atlas:
    path: codex/atlas/
    description: Research memory — write side; compiler-gated only

